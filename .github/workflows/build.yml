name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: 'KTechDropSync3.0/package-lock.json'

      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Dependencies
        run: |
          cd KTechDropSync3.0
          npm install

      - name: Expo Prebuild
        run: |
          cd KTechDropSync3.0
          npx expo prebuild --platform android

      - name: Build Android APK
        run: |
          cd KTechDropSync3.0/android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: KTechDropSync-APK
          path: KTechDropSync3.0/android/app/build/outputs/apk/debug/app-debug.apk
